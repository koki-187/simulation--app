<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#1C2B4A" />
<title>オフライン - MAS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #1C2B4A;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN",
                 "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    width: 100%;
    max-width: 480px;
    text-align: center;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 96px;
    height: 96px;
    border-radius: 24px;
    background: linear-gradient(135deg, #F97316 0%, #ea580c 100%);
    color: #ffffff;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 24px;
    box-shadow: 0 12px 32px rgba(249, 115, 22, 0.35);
  }
  .icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    border: 2px solid rgba(255, 255, 255, 0.15);
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
    line-height: 1.4;
  }
  p {
    font-size: 15px;
    line-height: 1.7;
    color: rgba(255, 255, 255, 0.78);
    margin-bottom: 16px;
  }
  .info {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    padding: 16px 20px;
    margin: 24px 0;
    text-align: left;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.65;
  }
  .actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 24px;
  }
  .btn {
    display: inline-block;
    padding: 14px 24px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    font-family: inherit;
  }
  .btn-primary {
    background: #F97316;
    color: #ffffff;
    box-shadow: 0 6px 16px rgba(249, 115, 22, 0.35);
  }
  .btn-primary:hover { background: #ea580c; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    background: transparent;
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.25);
  }
  .btn-secondary:hover { background: rgba(255, 255, 255, 0.08); }
  .footer {
    margin-top: 32px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.45);
  }
  @media (min-width: 480px) {
    .actions { flex-direction: row; justify-content: center; }
    .btn { min-width: 160px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">MAS</div>
    <div class="icon" aria-hidden="true">📡</div>
    <h1>オフラインです</h1>
    <p>ネットワーク接続がありません。</p>
    <div class="info">
      接続が復旧するまで、一度アクセスしたページはキャッシュからご覧いただけます。<br>
      新しいシミュレーションの実行にはインターネット接続が必要です。
    </div>
    <div class="actions">
      <button class="btn btn-primary" onclick="window.location.reload()">再試行</button>
      <a class="btn btn-secondary" href="/">ホームへ戻る</a>
    </div>
    <div class="footer">MAS - My Agent Simulation</div>
  </div>
<script>
  // ネットワーク復帰時に自動リロード
  window.addEventListener('online', function() {
    window.location.reload();
  });
</script>
</body>
</html>
